name: Migrate Production Database

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type MIGRATE_PRODUCTION_DATABASE to apply pending migrations to production.
        required: true
        type: string

concurrency:
  group: production-database-migrate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate:
    name: Apply production database migrations
    if: >-
      github.ref == 'refs/heads/main' &&
      inputs.confirmation == 'MIGRATE_PRODUCTION_DATABASE'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: apps/backend
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify production database secrets
        run: |
          test -n "$DATABASE_URL" || (echo "Missing PRODUCTION_DATABASE_URL secret." && exit 1)
          test -n "$DIRECT_URL" || (echo "Missing PRODUCTION_DIRECT_URL secret." && exit 1)

      - name: Apply pending migrations
        run: pnpm run migrate:deploy

      - name: Verify migration status
        run: pnpm exec prisma migrate status
